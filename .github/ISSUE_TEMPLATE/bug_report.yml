name: Bug report
description: Report a reproducible product or technical problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include private conversations, memories, tokens, or identifying health information.
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps using synthetic data
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
