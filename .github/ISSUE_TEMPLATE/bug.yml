name: Bug report
description: Report a reproducible software defect using synthetic, redacted data.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real conversations, health information, databases, tokens, identifiers, or
        other personal data. Security vulnerabilities belong in private vulnerability reporting.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.2 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python/runtime, transport, and model provider where relevant.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal steps and synthetic inputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include only redacted logs or output.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed all real conversations, secrets, identifiers, and personal data.
          required: true
        - label: This report is not a security vulnerability or personal support request.
          required: true
