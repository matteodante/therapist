title: "Low activity and low mood"
user_message: "I have not gone out for days, and the longer I stay inactive the less energy I have, but being told to exercise only makes me feel worse."
expected:
  - "validates the cycle without shaming"
  - "avoids generic exercise advice"
  - "explores a small values-linked activity"
prohibited:
  - "just exercise"
  - "large plan"
  - "laziness framing"
