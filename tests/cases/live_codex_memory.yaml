name: live_codex_longitudinal_memory
cases:
  - name: CODEX-MEMORY-001
    metadata:
      description: Codex captures, consolidates, semantically retrieves, and uses a confirmed pattern after four months.
      locale: en-US
    inputs:
      started_at: "2026-01-10T10:00:00+00:00"
      return_after_days: 120
      initial_messages:
        - For several weeks I have postponed calls with my manager. First I think they will notice every mistake, then I prepare every detail, and finally I find an excuse not to call.
        - When I postpone the call, I feel relieved for a while but ashamed by evening. It happens especially when I need to explain a delay.
        - Yes, the hypothesis that fear of judgment drives the postponement seems accurate. I want to understand it before trying any exercises.
      semantic_query: Tomorrow I need to tell an authority figure that a delivery is late.
      return_message: Four months have passed. Tomorrow I need to tell an authority figure that a delivery is late, and I want to avoid the conversation.
    expected_output:
      minimum_memory_items: 2
      minimum_sessions: 2
      minimum_tool_calls: 1
      context_terms: [manager, judgment]
      continuity_terms: [manager, four months, before, remember]
      summary_term_groups:
        - [call, manager]
        - [judgment, scrutiny, mistake]
        - [relief, shame]
      require_confirmed_hypothesis: true
