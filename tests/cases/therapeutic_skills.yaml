name: therapeutic_skill_contracts
cases:
  - name: SKILL-001
    metadata:
      description: Shared formulation stays concrete, tentative, and collaborative.
    inputs:
      path: skills/build-shared-formulation/SKILL.md
      required_terms:
        - possible moves, not ordered steps or a checklist
        - one recent concrete episode
        - Offer one concise maintaining loop as a hypothesis only when
        - Invite confirmation or correction
        - There is no obligation to cover every area or complete a cycle
        - Do not infer childhood cause
    expected_output:
      all_required_terms_present: true

  - name: SKILL-002
    metadata:
      description: Psychological flexibility uses one consented process without promising relief.
    inputs:
      path: skills/increase-psychological-flexibility/SKILL.md
      required_terms:
        - Select one process
        - ask permission
        - change the relationship to the experience
        - Do not promise calm
        - Stop if the exercise increases distress
    expected_output:
      all_required_terms_present: true

  - name: SKILL-003
    metadata:
      description: Behavioral work is a small experiment whose outcome is reviewed.
    inputs:
      path: skills/change-avoidance-behavior/SKILL.md
      required_terms:
        - Confirm the maintaining loop and ask permission
        - Make the action smaller
        - State the prediction being tested
        - Treat non-completion as information
    expected_output:
      all_required_terms_present: true

  - name: SKILL-004
    metadata:
      description: Problem solving is bounded, chosen by the user, and not imposed on harm or loss.
    inputs:
      path: skills/solve-practical-problems/SKILL.md
      required_terms:
        - Separate the concrete solvable part
        - Let the user choose
        - smallest next action
        - Do not turn grief
    expected_output:
      all_required_terms_present: true

  - name: SKILL-005
    metadata:
      description: Review compares prediction and outcome before adapting the formulation.
    inputs:
      path: skills/review-and-maintain-change/SKILL.md
      required_terms:
        - what the user actually tried
        - Compare the prediction with what happened
        - Update the formulation
        - Treat non-completion and setbacks as data
    expected_output:
      all_required_terms_present: true

  - name: SKILL-006
    metadata:
      description: The root process routes to no more than one intervention per turn.
    inputs:
      path: SKILL.md
      required_terms:
        - Select at most one intervention skill
        - Do not combine several exercises
        - this protocol as a private map, not a script
        - formulation is an option, not the automatic destination
        - Questions are optional
        - reflection-hypothesis-question template
    expected_output:
      all_required_terms_present: true

  - name: SKILL-007
    metadata:
      description: Misattunement is acknowledged and repaired before more technique.
    inputs:
      path: skills/repair-misattunement/SKILL.md
      required_terms:
        - Acknowledge the specific mismatch
        - Stop the rejected interpretation
        - ask one concrete question
        - Do not propose a new technique
    expected_output:
      all_required_terms_present: true

  - name: SKILL-008
    metadata:
      description: Formulation progressively covers context without becoming an intake battery.
    inputs:
      path: skills/build-shared-formulation/SKILL.md
      required_terms:
        - duration and change over time
        - user's own explanation
        - prior helpful or harmful responses
        - intake battery
        - active memory IDs
    expected_output:
      all_required_terms_present: true

  - name: SKILL-009
    metadata:
      description: Relational safety prevents dependency and engagement manipulation.
    inputs:
      path: SKILL.md
      required_terms:
        - Support the user's autonomy
        - irreplaceable source
        - replacing people or professional care
        - support one realistic human
        - manufacture intimacy
    expected_output:
      all_required_terms_present: true

  - name: SKILL-010
    metadata:
      description: Longitudinal review includes user-defined outcomes and unwanted effects.
    inputs:
      path: SKILL.md
      required_terms:
        - meaningful change in the user's own terms
        - unwanted effects
        - not evidence that the approach works generally
        - stop and understand the effect
        - AI-supported conversation or self-help
    expected_output:
      all_required_terms_present: true

  - name: SKILL-011
    metadata:
      description: Safety responses use contextual judgment instead of keyword routing.
    inputs:
      path: SKILL.md
      required_terms:
        - Assess possible danger from the user's meaning
        - Never infer danger from a keyword alone
        - ask one brief, direct question
        - possible immediate danger
        - call/text 988
        - 112 for Italy or the European Union
        - 911 for the United States
        - cannot monitor, locate, contact emergency services
    expected_output:
      all_required_terms_present: true
