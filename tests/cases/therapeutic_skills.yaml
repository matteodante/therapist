name: therapeutic_skill_contracts
cases:
  - name: ROOT
    inputs:
      path: SKILL.md
      required_terms:
        - Questions are optional
        - Do not force formulation
        - Ask permission before experiential work
        - at most one intervention approach per turn
        - Use ordinary presence
        - Loading no skill is valid
        - agent hypothesis remains an agent hypothesis
    expected_output: {all_required_terms_present: true}
  - name: CONTRACT
    inputs:
      path: skills/establish-contract-and-preferences/SKILL.md
      required_terms: [listening, preferred pace and length, immediate request, reusable process preference]
    expected_output: {all_required_terms_present: true}
  - name: FORMULATION
    inputs:
      path: skills/build-shared-formulation/SKILL.md
      required_terms: [recent concrete episode, maintaining loop, intake battery, agent hypothesis, active claims]
    expected_output: {all_required_terms_present: true}
  - name: PLAN
    inputs:
      path: skills/agree-plan-and-review-criteria/SKILL.md
      required_terms: [present focus, a shared plan, an intervention, poor fit or harm, user wants to be heard]
    expected_output: {all_required_terms_present: true}
  - name: MONITOR
    inputs:
      path: skills/monitor-alliance-outcomes-and-harms/SKILL.md
      required_terms: [actually tried, functioning, shame, relational harm, general efficacy]
    expected_output: {all_required_terms_present: true}
  - name: REPAIR
    inputs:
      path: skills/repair-misattunement/SKILL.md
      required_terms: [specific mismatch, without defending, one concrete question, new technique in the repair turn]
    expected_output: {all_required_terms_present: true}
  - name: FLEXIBILITY
    inputs:
      path: skills/increase-psychological-flexibility/SKILL.md
      required_terms: [Select one process, ask permission, changing the relationship, Do not promise calm, increases distress]
    expected_output: {all_required_terms_present: true}
  - name: AVOIDANCE
    inputs:
      path: skills/change-avoidance-behavior/SKILL.md
      required_terms: [ask permission, avoidance threshold, state the prediction, non-completion as information]
    expected_output: {all_required_terms_present: true}
  - name: PRACTICAL
    inputs:
      path: skills/solve-practical-problems/SKILL.md
      required_terms: [controllable part, let the user choose, smallest step, Do not turn grief]
    expected_output: {all_required_terms_present: true}
  - name: REVIEW
    inputs:
      path: skills/review-and-maintain-change/SKILL.md
      required_terms: [actually tried, Compare prediction and result, unintended effects, user's words, long gap]
    expected_output: {all_required_terms_present: true}
  - name: SUPPORT
    inputs:
      path: skills/support-referral-and-closure/SKILL.md
      required_terms: [human support, practical barriers, wish to stop, return without pressure, generic referral language]
    expected_output: {all_required_terms_present: true}
