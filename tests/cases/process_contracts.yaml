name: deterministic_process_contracts
cases:
  - name: supported-fact
    inputs:
      locale: en-US
      user_text: I moved to Bologna last month.
      model_reply: How has Bologna felt so far?
      tool_calls:
        - name: record_memory
          arguments:
            observations:
              - kind: fact
                content: The user moved to Bologna last month.
                evidence_quote: moved to Bologna last month
                aliases: [relocation, moved city]
    expected_output:
      completed: true
      memory_count: 1
      reply: How has Bologna felt so far?
      tool_path: [record_memory]

  - name: unsupported-fact
    inputs:
      locale: en-US
      user_text: Work was difficult today.
      model_reply: What made today difficult?
      tool_calls:
        - name: record_memory
          arguments:
            observations:
              - kind: fact
                content: The user has two children.
                evidence_quote: two children
    expected_output:
      completed: false
      memory_count: 0
      reply: ""
      tool_path: [record_memory]

  - name: italian-repair
    inputs:
      locale: it-IT
      user_text: Mi stai leggendo attraverso una lente che non è la mia.
      model_reply: Hai ragione, ho imposto una lettura che non ti appartiene. Cosa non ho colto?
    expected_output:
      completed: true
      memory_count: 0
      reply: Hai ragione, ho imposto una lettura che non ti appartiene. Cosa non ho colto?
      tool_path: []

  - name: ordinary-presence-without-state-change
    inputs:
      locale: en-US
      user_text: I do not know what I need yet. I just want to stay with how sad this feels.
      model_reply: We can stay with it. What feels heaviest right now?
    expected_output:
      completed: true
      memory_count: 0
      reply: We can stay with it. What feels heaviest right now?
      tool_path: []
