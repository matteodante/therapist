name: longitudinal_memory_clean_break
metadata:
  synthetic_only: true
  schema_version: 3
cases:
  - name: LM-001
    inputs:
      user_report: I often postpone calls with senior managers because I fear being judged.
      hypothesis: Fear of judgment may help maintain call avoidance.
      query: Tomorrow I need to call a senior manager.
      return_after_days: 130
    expected_output:
      user_origin: user_statement
      hypothesis_origin: agent_hypothesis
      hypothesis_fit: not_reviewed
      evidence_quality: exact_quote
  - name: LM-002
    inputs:
      original: I live in Turin.
      correction: That is wrong; I live in Milan.
      replacement_quote: I live in Milan.
      query: Where do I live?
      return_after_days: 195
    expected_output:
      active_content: I live in Milan.
      forbidden_active_content: I live in Turin.
      lifecycle: active
      export_preserves_superseded_history: true
  - name: LM-003
    inputs:
      user_report: I want this event forgotten.
      operation: forget
      query: Tell me about that event.
      return_after_days: 275
    expected_output:
      absent_from_context: true
      lifecycle_in_export: archived
