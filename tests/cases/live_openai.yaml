name: live_openai_therapeutic_process
cases:
  - name: LIVE-001
    metadata:
      description: Synthetic avoidance case across two sessions separated by four months.
      locale: it-IT
    inputs:
      model: openai:gpt-5.2
      started_at: "2026-01-10T10:00:00+00:00"
      return_after_days: 120
      initial_messages:
        - Da settimane rimando le chiamate con il mio responsabile. Ogni volta mi si stringe il petto e penso che scoprirà che non sono capace.
        - Succede soprattutto quando devo spiegare un ritardo. Preparo tutto nei dettagli, poi trovo una scusa e rimando. Dopo mi sento sollevato per un'ora, ma la sera mi vergogno.
        - "Sì, il ciclo che descrivi mi torna. Lo faccio anche con mio padre: se penso che possa criticarmi, evito di dirgli le cose finché diventano più grandi."
        - Vorrei provare qualcosa, ma se mi dai un esercizio troppo complicato probabilmente lo eviterò come la telefonata.
      return_messages:
        - Sono passati quattro mesi. Ieri il mio compagno mi ha chiesto di parlare delle spese e ho cambiato argomento.
        - "La piccola scaletta che avevamo discusso mi ha aiutato con alcune chiamate: l'ansia c'era, ma non ho rimandato. Forse evito anche la sensazione di deludere le persone importanti; non sono sicuro."
    expected_output:
      context_term: responsabile
      minimum_sessions: 2
      require_confirmed_memory: true
      require_confirmed_hypothesis: true
